log_level: Info
camera_params:
  exposure_time: 3000
  gain: 15.0
  frame_rate: -1.0
do_when_idle: BigBuff
debug_mode: true
step_by_step_debug: false
default_enemy_color: Red
camera_name: camera0
runes_topic: 
  service: runes
  instance: detector
  event: data
yolo_config:
  device: CPU
  model_path: assets/yolox_rune_3.6m.onnx
  use_latency_performancemode: true
  # 抄的中南的参数没改
  threshold: 0.50
  # threshold: 0.9
  top_k: 128
  nms_threshold: 0.3
  merge_conf_error: 0.15
  merge_min_iou: 0.9
corrector_config:
  roi_size: 100
  skewing: 0.2
  rune_size_tolerance: 0.3
  center_shape_tolerance: 0.2
  center_weight: 5
  show_window: false
