working_dir: "."
processes:
  iox_roudi:
    command: iox-roudi -c configs/iox-roudi_config.toml
    ready_log_line: "RouDi is ready for clients"
    availability:
      restart: always
  detector:
    command: build/linux/x86_64/release/buff_detector_offline
    availability:
      restart: always
    depends_on:
      iox_roudi:
        condition: process_log_ready

