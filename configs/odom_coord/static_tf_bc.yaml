log_level: Info
publish_interval_ms: 1000

static_broudcaster_conf:
  transforms:
    - parent_frame_id: map
      child_frame_id: odom
      translation:
        x: 0.0
        y: 0.0
        z: 0.0
      rpy_angle:
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
    # NOTE: odom到gimbal的变换由serial发布
    - parent_frame_id: gimbal
      child_frame_id: camera
      translation:
        x: 0.0
        y: -0.045
        z: 0.08557
      rpy_angle:
        roll: -90.0
        pitch: 0.0
        yaw: -90.0
