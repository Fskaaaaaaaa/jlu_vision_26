log_level: Info
publish_interval_ms: 1000

static_broudcaster_conf:
  transforms:
    - parent_frame_id: map
      child_frame_id: odom
      translation:
        x: 1.0
        y: 3.0
        z: -1.0
      rpy_angle:
        roll: 5.0
        pitch: 10.0
        yaw: 0.0
    - parent_frame_id: map
      child_frame_id: camera
      translation:
        x: 1.0
        y: -1.0
        z: -1.0
      rpy_angle:
        roll: 5.0
        pitch: 0.0
        yaw: 0.0
