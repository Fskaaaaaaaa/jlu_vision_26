log_level: Info
imu_name: imu0
map_frame_id: map
imu_initial_angle:
  roll: 0.0
  pitch: 0.0
  yaw: 0.0
imu_initial_trans:
  x: 0.0
  y: 0.0
  z: 0.0
imu_initial_vel:
  x: 0.0
  y: 0.0
  z: 0.0
imu_conf:
  gravity: 0.0                # 既然 IMU 已去重力，这里必须是 0
  accel_noise: [0.05, 0.05, 0.05]
  # 解释：消费级 IMU 的 linear acc 噪声 RMS 通常在 0.03~0.1 m/s^2
  # 你给的 1e-8 是物理上不可能的（等于宣称 IMU 比光学系统还准）
  gyro_noise: [0.005, 0.005, 0.005]
  # rad/s/sqrt(Hz) 量级
  accel_bias_rw_sigma: [0.001, 0.001, 0.001]
  gyro_bias_rw_sigma:  [0.0001, 0.0001, 0.0001]
  vel_noise: [0.5, 0.5, 0.5]
  # 速度先验必须“松”，否则 v 会数值锁死 → Indeterminant
  integration_noise: 1e-6
  prior_noise_rpy: 0.01        # rad
  prior_noise_xyz: 0.1         # m
  bias_noise: 0.01
  update_interval_ms: 100       # 不要拉到 9e6，那是在“关掉系统”
  use_imu_rpy: false
